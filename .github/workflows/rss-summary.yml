name: Daily RSS to Telegram

on:
  schedule:
    # Every day at 9 AM and 9 PM (UTC)
    - cron: "0 4,10,14 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # === НОВЫЙ БЛОК: Кэширование папки data ===
      - name: Cache data folder
        uses: actions/cache@v3
        with:
          path: data
          key: ${{ runner.os }}-data-${{ hashFiles('data/cache.json') }}
          restore-keys: |
            ${{ runner.os }}-data-
      # === КОНЕЦ НОВОГО БЛОКА ===

      - name: Run RSS Summarizer
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python main.py